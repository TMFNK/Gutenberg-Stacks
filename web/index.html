<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#12100c" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gutenberg Book Finder" />
    <meta property="og:description" content="Search 1,000 free Project Gutenberg books by title, author, mood, and more." />
    <meta property="og:url" content="" />
    <meta name="twitter:card" content="summary" />
    <title>Gutenberg Book Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1>Gutenberg Book Finder</h1>
      <p class="tagline">Find your next free book among Project Gutenberg&rsquo;s 1,000 most loved.</p>
      <div class="controls">
        <input id="search" type="search" placeholder="Search title, author, subject&hellip;" />
        <button id="surprise" type="button" class="primary">Surprise me</button>
        <button id="filters-toggle" type="button" aria-expanded="false" aria-controls="filters">
          Filters<span id="filter-count" class="badge" hidden></span>
        </button>
      </div>
      <div id="active-filters" class="active-filters" hidden></div>
      <p id="popular-label" class="shelf-label" hidden>Popular picks</p>
      <div id="popular-shelf" class="mood-shelf" hidden role="group" aria-label="Popular picks"></div>
      <p id="recent-label" class="shelf-label" hidden>Recently viewed</p>
      <div id="recent-shelf" class="mood-shelf" hidden role="group" aria-label="Recently viewed"></div>
      <p class="shelf-label">Browse by category</p>
      <div id="category-shelf" class="mood-shelf" role="group" aria-label="Browse by category"></div>
      <p class="shelf-label">Filter by mood</p>
      <div id="mood-shelf" class="mood-shelf" role="group" aria-label="Filter by mood"></div>
    </header>
    <div class="layout">
      <aside id="filters">
        <div class="sheet-handle" aria-hidden="true"></div>
        <label>Mood <select id="f-mood"></select></label>
        <label>Difficulty <select id="f-difficulty"></select></label>
        <label>Theme <select id="f-theme"></select></label>
        <label>Subject <select id="f-subject"></select></label>
        <label>Category <select id="f-bookshelf"></select></label>
        <label>Author <select id="f-author"></select></label>
        <label>Language <select id="f-lang"></select></label>
        <label>Era <select id="f-era"></select></label>
        <label>Sort by
          <select id="f-sort">
            <option value="relevance">Best match</option>
            <option value="downloads">Most downloaded</option>
            <option value="title">Title A&ndash;Z</option>
          </select>
        </label>
        <div class="filter-actions">
          <button id="clear" type="button">Clear search &amp; filters</button>
          <button id="apply" type="button" class="primary">Show books</button>
        </div>
      </aside>
      <main>
        <p id="count"></p>
        <div id="grid"></div>
        <div id="empty" class="empty-state" hidden>
          <p id="empty-msg">No books match.</p>
          <p id="empty-hint" class="empty-hint" hidden>Try one of these popular books instead:</p>
          <div id="empty-popular-grid" class="mini-grid" hidden></div>
          <div class="empty-actions">
            <button id="empty-reset" type="button">Clear search &amp; filters</button>
            <button id="empty-popular" type="button" class="primary">Browse popular picks</button>
          </div>
        </div>
        <p id="error" hidden>Could not load the book data. Please try again later.</p>
      </main>
    </div>
    <div id="sheet-backdrop" hidden></div>
    <div id="detail-backdrop" hidden><div id="detail" role="dialog" aria-modal="true" aria-labelledby="detail-title"></div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
